services:
  postgres:
    image: postgres:16
    container_name: stock-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: stock_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d stock_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: